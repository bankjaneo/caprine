name: Build and publish
on:
  push:
    tags:
      - '*'
jobs:
  tests:
    uses: ./.github/workflows/tests.yml
  build:
    needs: [tests]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Caprine
        run: npm run build
      - name: Cleanup tag
        uses: mad9000/actions-find-and-replace-string@5
        id: release_tag
        with:
          source: ${{ github.ref_name }}
          find: v
          replace: ''
      - name: Ensure GitHub Release exists
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes --repo "${{ github.repository }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@v1
        if: startsWith(matrix.os, 'ubuntu')
      - name: Package Caprine for macOS
        if: startsWith(matrix.os, 'macos')
        run: |
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            export CSC_LINK="${{ secrets.CSC_LINK }}"
            export CSC_KEY_PASSWORD="${{ secrets.CSC_KEY_PASSWORD }}"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npm run dist:mac -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS artifacts to GitHub Release
        if: startsWith(matrix.os, 'macos')
        run: gh release upload "${{ github.ref_name }}" dist/*.dmg dist/*.zip --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Package Caprine for Windows
        if: startsWith(matrix.os, 'windows')
        run: npm run dist:win -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows artifacts to GitHub Release
        if: startsWith(matrix.os, 'windows')
        run: gh release upload "${{ github.ref_name }}" dist/*.exe --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Package Caprine for Linux
        if: startsWith(matrix.os, 'ubuntu')
        run: npm run dist:linux -- --publish never
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.snapcraft_token }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Linux artifacts to GitHub Release
        if: startsWith(matrix.os, 'ubuntu')
        run: gh release upload "${{ github.ref_name }}" dist/*.AppImage dist/*.deb --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build RPM packages (x86_64 and arm64)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          bash build-rpm.sh
      - name: Upload RPM packages to GitHub Releases
        if: startsWith(matrix.os, 'ubuntu')
        run: gh release upload "${{ github.ref_name }}" dist/*.rpm --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload x64 deb to Gemfury
        if: startsWith(matrix.os, 'ubuntu')
        run: curl -F package=@dist/caprine_${{ steps.release_tag.outputs.value }}_amd64.deb https://${{ secrets.gemfury_token }}@push.fury.io/lefterisgar/
      - name: Upload ARM64 deb to Gemfury
        if: startsWith(matrix.os, 'ubuntu')
        run: curl -F package=@dist/caprine_${{ steps.release_tag.outputs.value }}_arm64.deb https://${{ secrets.gemfury_token }}@push.fury.io/lefterisgar/
